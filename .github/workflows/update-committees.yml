name: Update Committees

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # Daily at 06:00 UTC (change if needed)

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@2e3e4b15a884dc73a63f962bff250a855150a234
        with:
          python-version: '3.x'
          pip-install: -r .github/workflows/requirements.txt
      - name: Run committee update script
        run: |
          python .github/workflows/update-committees.py \
            -f src/docs/governing_board.md \
            -c "https://projectadmin.lfx.linuxfoundation.org/project/lfGnr1MCq2lbKUf6f7/collaboration/committees/0db8bf8a-dbf5-4a6a-99ba-ba7c13617a46"
          python .github/workflows/update-committees.py \
            -f src/docs/technical_advisory_council.md \
            -c "https://projectadmin.lfx.linuxfoundation.org/project/lfGnr1MCq2lbKUf6f7/collaboration/committees/2269487a-9357-4906-8bd1-39dda01f56c4"
      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-committees
          title: "Update committee members"
          body: |
            Automated update of committee membership.
            This PR was generated by GitHub Actions.
          commit-message: "Auto-update committee members"
          delete-branch: true
      - name: Enable auto-merge
        if: steps.create_pr.outputs.pull-request-number != ''
        shell: bash
        run: gh pr merge --merge --auto "1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
