name: Update Project Releases RSS

on:
  schedule:
    - cron: "0 12 * * *"   # daily at 03:00 UTC
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests

      - name: Generate RSS feed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python src/helper_scripts/update_project_releases_rss.py

      - name: Commit RSS feed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add src/docs/public/feeds/project/releases.xml
          git commit -m "Update project releases RSS feed" || echo "No changes"
          git push

