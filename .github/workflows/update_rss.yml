name: Update Project Releases RSS

on:
  schedule:
    - cron: "0 12 * * *"   # daily at 12:00 UTC
    
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests

      - name: Generate RSS feed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python src/helper_scripts/update_project_releases_rss.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update project releases RSS feed"
          title: "[Bot]: Update project releases RSS feed"
          body: "Automated update of the project releases RSS feed."
          branch: "update-project-releases-rss"
          add-paths: |
            src/docs/public/feeds/project/rss.xml
